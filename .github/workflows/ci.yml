name: CI Software Testing

on: [push]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: toko_bahan_makanan_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Kode
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, fileinfo, mysql
          coverage: none

      - name: Setup Node.js # Tambahan untuk compile assets
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies (Compile PHP)
        run: composer install --prefer-dist --no-progress

      - name: Install Frontend & Build Assets (Compile Assets)
        run: |
          npm install
          npm run build

      - name: Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: toko_bahan_makanan_test
          DB_USERNAME: root
          DB_PASSWORD: root

      - name: Run All Tests (Unit & Integration)
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: toko_bahan_makanan_test
          DB_USERNAME: root
          DB_PASSWORD: root